kind = "web"
previewPath = "/"
title = "VASP Systemic"
version = "1.0.0"
id = "artifacts/vasp-systemic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19253

[services.development]
run = "pnpm --filter @workspace/vasp-systemic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vasp-systemic", "run", "build" ]
publicDir = "artifacts/vasp-systemic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19253"
BASE_PATH = "/"
